# Fly.io configuration for stock telegram bot
app = "finance-stock-bot"
primary_region = "nrt"  # Tokyo (Asia nearest)

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-sensitive env vars can go here
  # Sensitive values are set via: fly secrets set KEY=VALUE

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
