name: Agent Search

description: >
  신규 투자 방법론 탐색(agent_search 역할) 및 backlog 저장을 위한 워크플로우.

on:
  workflow_dispatch:

jobs:
  check_optimize:
    runs-on: ubuntu-latest
    outputs:
      optimize_running: ${{ steps.check.outputs.optimize_running }}
    steps:
      - name: Check if optimize workflow is running
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUNNING=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/optimize.yml/runs?status=in_progress&per_page=1" \
            --jq '.total_count')
          if [ "$RUNNING" -gt 0 ]; then
            echo "optimize_running=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Optimize workflow is currently running — skipping agent_search to avoid merge conflicts."
          else
            echo "optimize_running=false" >> "$GITHUB_OUTPUT"
            echo "✅ Optimize workflow is not running — proceeding with agent_search."
          fi

  agent_search:
    needs: check_optimize
    if: needs.check_optimize.outputs.optimize_running != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run agent_search (backlog only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python agent_search_run.py

      - name: Commit and push backlog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "agent_search: 신규 방법론 backlog 저장 [skip ci]"
          file_pattern: 'searchBacklog.json'
          branch: main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
