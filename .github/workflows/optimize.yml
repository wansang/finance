name: Strategy Optimizer

on:
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run optimizer
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPTIMIZER_TIME_LIMIT_SECONDS: '1200'
          OPTIMIZER_MAX_CANDIDATES: '80'
        run: |
          python optimizer.py

      - name: Commit optimized strategy config
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-optimized strategy config [skip ci]"
          file_pattern: 'strategy_config.json'
          branch: main
          push_options: '--force'
