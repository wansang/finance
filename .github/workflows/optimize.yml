name: Strategy Optimizer

on:
  workflow_dispatch:

jobs:
  # ── 1단계: backlog 크기 확인 → 배치 수 결정 ──────────────────────────
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      batch_matrix: ${{ steps.calc.outputs.batch_matrix }}
      batch_total:  ${{ steps.calc.outputs.batch_total }}
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Calculate batch count
        id: calc
        run: |
          python3 - <<'EOF'
          import json, os, math

          try:
              backlog = json.load(open('searchBacklog.json'))
          except Exception:
              backlog = []

          try:
              cfg = json.load(open('strategy_config.json'))
              per_run = int(cfg.get('BACKLOG_VALIDATE_PER_RUN', 5))
          except Exception:
              per_run = 5

          n = len(backlog)
          total = max(1, math.ceil(n / per_run)) if n > 0 else 1
          # GitHub Actions matrix 최대 256개, 실용적 상한 10개
          total = min(total, 10)
          matrix = json.dumps(list(range(total)))
          print(f"backlog={n}건, per_run={per_run}, batch_total={total}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"batch_matrix={matrix}\n")
              fh.write(f"batch_total={total}\n")
          EOF

  # ── 2단계: 배치별 병렬 최적화 ──────────────────────────────────────
  optimize:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batch_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run optimizer (batch ${{ matrix.batch }})
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPTIMIZER_TIME_LIMIT_SECONDS: '1800'
          OPTIMIZER_MAX_CANDIDATES: '80'
          BATCH_INDEX: ${{ matrix.batch }}
          BATCH_TOTAL: ${{ needs.prepare.outputs.batch_total }}
        run: python optimizer.py

      - name: Upload batch results
        uses: actions/upload-artifact@v4
        with:
          name: batch-${{ matrix.batch }}
          path: |
            searchBacklog_history_batch_${{ matrix.batch }}.json
            approved_changes_batch_${{ matrix.batch }}.json
          if-no-files-found: ignore
          retention-days: 1

  # ── 3단계: 결과 합산 → strategy_config.json 반영 ───────────────────
  merge:
    needs: optimize
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: batch-*
          merge-multiple: true

      - name: Merge batch results
        run: python merge_batches.py

      - name: Commit and push (rebase to avoid overwriting concurrent changes)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strategy_config.json signal_performance.json algorithm_update_log.json \
                  searchBacklog.json searchBacklog_history.json
          # 변경사항이 없으면 commit 스킵
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "Auto-optimized strategy config [skip ci]"
          # agent_search 등 동시 push 가 있으면 rebase 후 재push
          git pull --rebase --autostash origin main
          git push origin main

  # ── 4단계: Auto Evolution / 성과 분석 (단일 잡, 배치 완료 후) ───────
  evolve:
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: main  # merge 후 최신 strategy_config.json 사용

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run optimizer (Auto Evolution only, no batch)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPTIMIZER_TIME_LIMIT_SECONDS: '7200'
          OPTIMIZER_MAX_CANDIDATES: '80'
          # BATCH_INDEX 미설정 → process_search_backlog 스킵, optimize() 만 실행
        run: |
          python3 -c "
          from optimizer import StrategyOptimizer
          opt = StrategyOptimizer()
          opt.optimize()
          "

      - name: Commit evolve results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strategy_config.json signal_performance.json algorithm_update_log.json \
                  analyzer.py searchBacklog.json
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "Auto Evolution: algorithm update [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

