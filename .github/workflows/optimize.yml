name: Strategy Optimizer

on:
  schedule:
    # Run every weekend day at 09:00 KST (00:00 UTC Sat/Sun)
    - cron: '0 0 * * 6,0'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run optimizer
        run: |
          python optimizer.py

      - name: Commit optimized strategy config
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-optimized strategy config [skip ci]"
          file_pattern: 'strategy_config.json'
          branch: main
          push_options: '--force'
