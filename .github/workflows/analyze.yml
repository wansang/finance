name: Elite Stock Analysis

on:
  push:
    branches: [main]
  schedule:
    # Run at 23:00 UTC every day (08:00 KST)
    - cron: '00 23 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for auto-commit
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run analyzer
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Start the automated analysis
          python main.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Automated update of analysis results [skip ci]"
          file_pattern: 'holdings.json recommendations.csv'
          branch: main
          push_options: '--force'
